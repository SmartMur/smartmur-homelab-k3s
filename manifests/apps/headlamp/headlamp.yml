---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp
  namespace: apps

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: apps

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: apps
  labels:
    app: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      serviceAccountName: headlamp
      containers:
        - name: headlamp
          image: ghcr.io/headlamp-k8s/headlamp:latest
          args:
            - -in-cluster
            - -plugins-dir=/headlamp/plugins
          ports:
            - containerPort: 4466
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: headlamp
  namespace: apps
spec:
  selector:
    app: headlamp
  ports:
    - name: http
      port: 80
      targetPort: 4466

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`k8s.smartmur.ca`)
      kind: Rule
      services:
        - name: headlamp
          port: 80
  tls: {}
