---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obsidian-vault
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian
  namespace: apps
  labels:
    app: obsidian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: obsidian
    spec:
      initContainers:
        - name: init-x11
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /tmp/.X11-unix && chmod 1777 /tmp/.X11-unix"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: obsidian
          image: lscr.io/linuxserver/obsidian:latest
          ports:
            - containerPort: 3000
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Toronto"
            - name: SELKIES_MODE
              value: "websockets"
            - name: SELKIES_FRAMERATE
              value: "15"
            - name: SELKIES_H264_CRF
              value: "30"
            - name: SELKIES_AUDIO_BITRATE
              value: "64000"
            - name: SELKIES_MANUAL_WIDTH
              value: "1280"
            - name: SELKIES_MANUAL_HEIGHT
              value: "720"
            - name: SELKIES_USE_CSS_SCALING
              value: "true"
          volumeMounts:
            - name: vault
              mountPath: /config
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 2Gi
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: obsidian
  namespace: apps
spec:
  selector:
    app: obsidian
  ports:
    - port: 3000

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: obsidian
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`obsidian.smartmur.ca`)
      kind: Rule
      services:
        - name: obsidian
          port: 3000
  tls: {}
