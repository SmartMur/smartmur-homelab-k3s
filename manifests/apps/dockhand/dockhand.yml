---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dockhand-data
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dockhand
  namespace: apps
  labels:
    app: dockhand
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dockhand
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: dockhand
    spec:
      containers:
        - name: dockhand
          image: fnsys/dockhand:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dockhand-data

---
apiVersion: v1
kind: Service
metadata:
  name: dockhand
  namespace: apps
spec:
  selector:
    app: dockhand
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dockhand
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`dockhand2.kwe2.org`)
      kind: Rule
      services:
        - name: dockhand
          port: 3000
  tls: {}
