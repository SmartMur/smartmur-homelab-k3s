---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-workspace
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

# Secret `code-server-secret` is required and must be provided via
# local-only `manifests/secrets/*.yml` or `kubectl create secret`.
# Required keys: PASSWORD.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: apps
  labels:
    app: code-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: code-server
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: init-profile-dirs
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              set -eu
              mkdir -p /workspace/.code-server-profile/local-share-code-server
              mkdir -p /workspace/.code-server-profile/config-home
              mkdir -p /workspace/.code-server-profile/cache-home
              if [ -d /workspace/.code-server-profile/config-code-server ] && [ ! -e /workspace/.code-server-profile/config-home/code-server ]; then
                mkdir -p /workspace/.code-server-profile/config-home/code-server
                cp -a /workspace/.code-server-profile/config-code-server/. /workspace/.code-server-profile/config-home/code-server/ || true
              fi
              mkdir -p /workspace/.code-server-profile/config-home/code-server
              chown -R 1000:1000 /workspace/.code-server-profile
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      containers:
        - name: code-server
          image: codercom/code-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PROXY_DOMAIN
              value: code.smartmur.ca
            - name: EXTENSIONS_GALLERY
              value: '{"serviceUrl":"https://marketplace.visualstudio.com/_apis/public/gallery","itemUrl":"https://marketplace.visualstudio.com/items","cacheUrl":"https://vscode.blob.core.windows.net/gallery/index","resourceUrlTemplate":"https://marketplace.visualstudio.com/_apis/public/gallery/publishers/{publisher}/vsextensions/{name}/{version}/vspackage"}'
          envFrom:
            - secretRef:
                name: code-server-secret
          volumeMounts:
            - name: workspace
              mountPath: /home/coder/workspace
            - name: workspace
              mountPath: /home/coder/.local/share/code-server
              subPath: .code-server-profile/local-share-code-server
            - name: workspace
              mountPath: /home/coder/.config
              subPath: .code-server-profile/config-home
            - name: workspace
              mountPath: /home/coder/.cache
              subPath: .code-server-profile/cache-home
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: code-server-workspace

---
apiVersion: v1
kind: Service
metadata:
  name: code-server
  namespace: apps
spec:
  selector:
    app: code-server
  ports:
    - port: 8080

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: code-server
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`code.smartmur.ca`)
      kind: Rule
      services:
        - name: code-server
          port: 8080
  tls: {}
