---
# Pangolin — WireGuard tunneled reverse proxy (fosrl/pangolin)
# hostNetwork: true because WireGuard binds to host UDP ports
# Config injected via ConfigMap; writes runtime state to PVC
# Secret `pangolin-secret` is required and must be provided via
# local-only `manifests/secrets/*.yml` or `kubectl create secret`.
# Required key: PANGOLIN_APP_SECRET.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pangolin-data
  namespace: apps
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pangolin-config
  namespace: apps
data:
  config.yml: |
    app:
      log_level: "info"
      save_logs: false
      dashboard_url: "https://pangolin.kwe2.org"
      base_domain: "kwe2.org"
      admin_user_secret_enabled: false

    domains:
      kwe2.org:
        base_domain: "kwe2.org"
        cert_resolver: ""
        prefer_wildcard_cert: false

    server:
      external_port: 3000
      internal_port: 3001
      next_port: 3002
      secret: "__PANGOLIN_APP_SECRET__"
      resource_access_token_param: "token"
      session_cookie_name: "p_session_token"

    traefik:
      cert_resolver: ""
      http_entrypoint: "web"
      https_entrypoint: "websecure"

    gerbil:
      start_port: 51820
      base_endpoint: "pangolin.kwe2.org"
      remote_config_endpoint: "http://localhost:3001/v1"
      dns_wait_time: 5

    rate_limits:
      global:
        window_minutes: 1
        max_requests: 500

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pangolin
  namespace: apps
  labels:
    app: pangolin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pangolin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pangolin
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: copy-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              : "${PANGOLIN_APP_SECRET:?missing required secret key PANGOLIN_APP_SECRET}"
              mkdir -p /data/config
              cp /configmap/config.yml /data/config/config.yml
              sed -i "s|__PANGOLIN_APP_SECRET__|${PANGOLIN_APP_SECRET}|g" /data/config/config.yml
              echo "Config copied"
          env:
            - name: PANGOLIN_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: pangolin-secret
                  key: PANGOLIN_APP_SECRET
          volumeMounts:
            - name: configmap
              mountPath: /configmap
            - name: data
              mountPath: /data
      containers:
        - name: pangolin
          image: fosrl/pangolin:latest
          ports:
            - containerPort: 3000
              hostPort: 3000
            - containerPort: 3001
              hostPort: 3001
          volumeMounts:
            - name: data
              mountPath: /app/config
              subPath: config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
        - name: gerbil
          image: fosrl/gerbil:latest
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "SYS_MODULE"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for Pangolin API on :3001..."
              until wget -qO- http://localhost:3001/v1/auth/me > /dev/null 2>&1 || \
                    wget -qO- http://localhost:3001/ > /dev/null 2>&1; do
                sleep 5
              done
              echo "Pangolin ready, starting Gerbil"
              exec /usr/local/bin/gerbil \
                -remoteConfig http://localhost:3001/v1 \
                -reachableAt http://localhost:3001
          ports:
            - containerPort: 51820
              protocol: UDP
              hostPort: 51820
            - containerPort: 21820
              protocol: UDP
              hostPort: 21820
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: configmap
          configMap:
            name: pangolin-config
        - name: data
          persistentVolumeClaim:
            claimName: pangolin-data

---
apiVersion: v1
kind: Service
metadata:
  name: pangolin
  namespace: apps
spec:
  selector:
    app: pangolin
  ports:
    - name: api
      port: 3000
    - name: internal
      port: 3001
    - name: web
      port: 3002
    - name: wg
      port: 51820
      protocol: UDP
    - name: wg-quic
      port: 21820
      protocol: UDP

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pangolin
  namespace: apps
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`pangolin.kwe2.org`) && PathPrefix(`/api/v1`)
      kind: Rule
      services:
        - name: pangolin
          port: 3000
    - match: Host(`pangolin.kwe2.org`)
      kind: Rule
      services:
        - name: pangolin
          port: 3002
  tls: {}
