---
# Generated at deploy time by scripts/deploy-notify.sh
# Expected ConfigMap name: notify-app-code (namespace: apps)
apiVersion: v1
kind: ConfigMap
metadata:
  name: notify-config
  namespace: apps
data:
  notify.yaml: |
    app:
      name: Notify
      environment: kwe2-k3s
      interval_seconds: 120
      alert_repeat_minutes: 30
      notify_on_first_failure: true
      state_file: /data/notify_state.json
      status_server:
        enabled: true
        host: "0.0.0.0"
        port: 9090

    channels:
      telegram:
        enabled: true
        bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"

      whatsapp:
        enabled: false
        account_sid: "${TWILIO_ACCOUNT_SID}"
        auth_token: "${TWILIO_AUTH_TOKEN}"
        from_number: "${TWILIO_WHATSAPP_FROM}"
        to_number: "${TWILIO_WHATSAPP_TO}"

      email:
        enabled: false
        smtp_host: "${ALERT_SMTP_HOST:-smtp.gmail.com}"
        smtp_port: ${ALERT_SMTP_PORT:-587}
        username: "${ALERT_EMAIL_USER}"
        password: "${ALERT_EMAIL_PASSWORD}"
        from_email: "${ALERT_FROM_EMAIL:-notify@kwe2.org}"
        to_emails:
          - "${ALERT_TO_EMAIL_1:-you@example.com}"
        use_tls: true
        use_ssl: false

    chatops:
      telegram:
        enabled: true
        bot_token: "${TELEGRAM_BOT_TOKEN}"
        admin_chat_ids:
          - "${TELEGRAM_CHAT_ID}"
        poll_interval_seconds: 12
        restart:
          enabled: true
          default_namespace: "apps"
          allowed_namespaces:
            - "apps"
          allowed_deployments:
            - "notify"
            - "homepage"
            - "obsidian"
            - "headlamp"
            - "code-server"
            - "dockhand"

    checks:
      - id: k8s_nodes
        type: k8s_api_nodes_ready
        enabled: true
        max_not_ready: 0
        severity: critical

      - id: k8s_pods
        type: k8s_api_pods_health
        enabled: true
        ignore_namespaces:
          - kube-system
        max_unhealthy: 0
        max_container_restarts: 8
        recent_restart_window_minutes: 360
        allowed_waiting_reasons:
          - ContainerCreating
          - PodInitializing
        severity: critical

      - id: k8s_deployments
        type: k8s_api_deployments_available
        enabled: true
        ignore_namespaces:
          - kube-system
        max_unavailable: 0
        severity: high

      - id: k8s_dashboard_http
        type: http
        enabled: true
        url: "http://headlamp.apps"
        method: GET
        expected_status: [200, 302]
        timeout_seconds: 10
        severity: high

      - id: obsidian_http
        type: http
        enabled: true
        url: "http://obsidian:3000"
        method: GET
        expected_status: [200, 302]
        timeout_seconds: 10
        severity: warning

      - id: homepage_http
        type: http
        enabled: true
        url: "http://homepage:3000"
        method: GET
        expected_status: [200, 302]
        timeout_seconds: 10
        severity: warning

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notify
  namespace: apps

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: notify-readonly
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: notify-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: notify-readonly
subjects:
  - kind: ServiceAccount
    name: notify
    namespace: apps

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notify-restart-deployments
  namespace: apps
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
    resourceNames:
      - notify
      - homepage
      - obsidian
      - headlamp
      - code-server
      - dockhand

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notify-restart-deployments
  namespace: apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: notify-restart-deployments
subjects:
  - kind: ServiceAccount
    name: notify
    namespace: apps

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: notify-data
  namespace: apps
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify
  namespace: apps
  labels:
    app: notify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notify
  template:
    metadata:
      labels:
        app: notify
    spec:
      serviceAccountName: notify
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: notify
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail
              python -m pip install --no-cache-dir --disable-pip-version-check --target /tmp/site-packages pyyaml requests
              export PYTHONPATH="/app:/tmp/site-packages"
              exec python -m notify --config /etc/notify/notify.yaml run
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          envFrom:
            - secretRef:
                name: notify-channel-secrets
                optional: true
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: notify-code
              mountPath: /app/notify
              readOnly: true
            - name: notify-config
              mountPath: /etc/notify/notify.yaml
              subPath: notify.yaml
              readOnly: true
            - name: notify-data
              mountPath: /data
      volumes:
        - name: notify-code
          configMap:
            name: notify-app-code
        - name: notify-config
          configMap:
            name: notify-config
        - name: notify-data
          persistentVolumeClaim:
            claimName: notify-data

---
apiVersion: v1
kind: Service
metadata:
  name: notify
  namespace: apps
spec:
  selector:
    app: notify
  ports:
    - name: http
      port: 9090
      targetPort: http

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notify
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`notify.kwe2.org`)
      kind: Rule
      services:
        - name: notify
          port: 9090
  tls: {}
