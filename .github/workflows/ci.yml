name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  shell-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v6
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Shell syntax checks
        run: bash -n scripts/*.sh

      - name: Security scrub (working tree)
        run: python3 scripts/security_scrub.py --no-history

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

      - name: Install Ansible
        run: python -m pip install --upgrade ansible

      - name: Ansible playbook syntax check
        run: |
          for playbook in ansible/playbook-*.yml; do
            ansible-playbook --syntax-check "$playbook"
          done
