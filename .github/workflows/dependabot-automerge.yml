name: Dependabot Auto-Merge

on:
  pull_request_target:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >-
      ${{
        github.actor == 'dependabot[bot]' &&
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@dbb049abf0d677abbd7f7eee0375145b417fdd34  # v2
        with:
          github-token: ${{ github.token }}

      - name: Update branch to latest main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_api="repos/${{ github.repository }}/pulls/"
          pr_api+="${{ github.event.pull_request.number }}/update-branch"
          gh api --method PUT "$pr_api" || true

      - name: Approve Dependabot PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review "$PR_URL" \
            --approve \
            --body "Auto-approved dependency update."

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge "$PR_URL" \
            --squash \
            --auto \
            --delete-branch
